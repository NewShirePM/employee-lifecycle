<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Lifecycle — NewShire</title>
  <meta name="theme-color" content="#1C3740" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23CDA04B'/><text x='16' y='23' font-family='Georgia,serif' font-size='22' font-weight='bold' fill='%2328434C' text-anchor='middle'>L</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Source Sans 3','Segoe UI',sans-serif;background:#F7F8F7;color:#28434C;-webkit-font-smoothing:antialiased}
    #root{min-height:100vh}
    input,select,textarea,button{font-family:inherit}
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:#EDF4F7}
    ::-webkit-scrollbar-thumb{background:#A8B0B0;border-radius:3px}
    ::placeholder{color:#A8B0B0}
    @keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
  </style>
  <script src="https://unpkg.com/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;color:#7A8585">Loading Employee Lifecycle…</div></div>
  <script>
    (async function () {
      try {
        const r = await fetch('employee-lifecycle.jsx?v=' + Date.now());
        if (!r.ok) throw new Error('Could not load app: HTTP ' + r.status);
        const code = await r.text();
        // Force the classic JSX runtime — newer @babel/standalone defaults the
        // 'react' preset to the automatic runtime, which prepends
        //   import { jsx } from "react/jsx-runtime";
        // That import can't be evaluated outside a module, which crashes the
        // eval below. Classic emits React.createElement(...) calls — no import.
        const out = Babel.transform(code, { presets: [['react', { runtime: 'classic' }]] }).code;
        eval(out);
        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;color:#C44B3B;font-family:sans-serif;max-width:640px;margin:auto">'
          + '<h2 style="margin-bottom:12px">App failed to load</h2>'
          + '<pre style="font-size:12px;background:#fff;padding:12px;border-radius:4px;overflow:auto;white-space:pre-wrap">'
          + (e && e.stack ? e.stack : e.message) + '</pre></div>';
      }
    })();
  </script>
</body>
</html>
